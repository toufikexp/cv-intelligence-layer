# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Switches to CPU Dockerfile, hardens passwords, removes dev bind-mounts,
# and maps the API to port 8801.
services:
  cv-db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

  cv-redis:
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  cv-api:
    build:
      dockerfile: Dockerfile.cpu
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://cv_user:${POSTGRES_PASSWORD}@cv-db:5432/cv_intelligence
      EASYOCR_GPU: "false"
    ports:
      - "8801:8001"
    volumes:
      - ./data/uploads:/data/uploads:z
      - ./cv-models/fasttext/lid.176.bin:/models/lid.176.bin:ro
    deploy: {}
    restart: unless-stopped

  cv-worker:
    build:
      dockerfile: Dockerfile.cpu
    environment:
      DATABASE_URL: postgresql+asyncpg://cv_user:${POSTGRES_PASSWORD}@cv-db:5432/cv_intelligence
      EASYOCR_GPU: "false"
    volumes:
      - ./data/uploads:/data/uploads:z
      - ./cv-models/fasttext/lid.176.bin:/models/lid.176.bin:ro
    deploy: {}
    restart: unless-stopped
