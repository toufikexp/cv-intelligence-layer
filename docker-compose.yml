services:
  cv-db:
    image: postgres:16
    environment:
      POSTGRES_DB: cv_intelligence
      POSTGRES_USER: cv_user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cv_user -d cv_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 20

  cv-redis:
    image: redis:7
    ports:
      - "6380:6379"

  cv-api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cv_user:password@cv-db:5432/cv_intelligence
      REDIS_URL: redis://cv-redis:6379/0
      CELERY_BROKER_URL: redis://cv-redis:6379/0
      UPLOAD_DIR: /data/uploads
    ports:
      - "8001:8001"
    volumes:
      - ./data/uploads:/data/uploads
    depends_on:
      cv-db:
        condition: service_healthy
      cv-redis:
        condition: service_started

  cv-worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cv_user:password@cv-db:5432/cv_intelligence
      REDIS_URL: redis://cv-redis:6379/0
      CELERY_BROKER_URL: redis://cv-redis:6379/0
      UPLOAD_DIR: /data/uploads
    volumes:
      - ./data/uploads:/data/uploads
    depends_on:
      cv-db:
        condition: service_healthy
      cv-redis:
        condition: service_started

