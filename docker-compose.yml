services:
  cv-db:
    image: postgres:16
    environment:
      TZ: Africa/Algiers
      POSTGRES_DB: cv_intelligence
      POSTGRES_USER: cv_user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - cv-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cv_user -d cv_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 20

  cv-redis:
    image: redis:7
    environment:
      TZ: Africa/Algiers
    ports:
      - "6380:6379"

  cv-api:
    build:
      context: .
      args:
        CUDA_VERSION: ${CUDA_VERSION:-cu121}
    env_file: .env
    environment:
      TZ: Africa/Algiers
      APP_ENV: development
      APP_PORT: 8001
      DATABASE_URL: postgresql+asyncpg://cv_user:password@cv-db:5432/cv_intelligence
      REDIS_URL: redis://cv-redis:6379/0
      CELERY_BROKER_URL: redis://cv-redis:6379/0
      UPLOAD_DIR: /data/uploads
      EASYOCR_GPU: ${EASYOCR_GPU:-true}
    ports:
      - "8001:8001"
    volumes:
      - ./app:/app/app
      - ./prompts:/app/prompts
      - ./data/uploads:/data/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      cv-db:
        condition: service_healthy
      cv-redis:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  cv-worker:
    build:
      context: .
      args:
        CUDA_VERSION: ${CUDA_VERSION:-cu121}
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q default,ocr
    env_file: .env
    environment:
      TZ: Africa/Algiers
      DATABASE_URL: postgresql+asyncpg://cv_user:password@cv-db:5432/cv_intelligence
      REDIS_URL: redis://cv-redis:6379/0
      CELERY_BROKER_URL: redis://cv-redis:6379/0
      UPLOAD_DIR: /data/uploads
      EASYOCR_GPU: ${EASYOCR_GPU:-true}
    volumes:
      - ./app:/app/app
      - ./prompts:/app/prompts
      - ./data/uploads:/data/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      cv-db:
        condition: service_healthy
      cv-redis:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  cv-db-data:
